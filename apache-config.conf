<VirtualHost *:80>
    DocumentRoot /var/www/html
    
    # Aliases для статических файлов из public/
    Alias /icons /var/www/html/public/icons
    Alias /js /var/www/html/public/js
    Alias /screenshots /var/www/html/public/screenshots
    Alias /manifest.json /var/www/html/public/manifest.json
    Alias /sw.js /var/www/html/public/sw.js
    Alias /favicon.ico /var/www/html/public/favicon.ico
    
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>
    
    # Разрешить доступ к public директориям
    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>