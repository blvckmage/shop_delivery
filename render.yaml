services:
  # Веб-приложение
  - type: web
    name: delivery-shop
    env: docker
    plan: free
    region: oregon
    envVars:
      - key: PHP_VERSION
        value: "8.2"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_LIFETIME
        value: "7200"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_WHATSAPP_TO
        sync: false
